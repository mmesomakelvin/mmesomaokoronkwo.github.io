<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Microsoft Fabric pipeline flow</title>
  <desc id="desc">Animated data pipeline moving from GitHub CSV source through pipeline, lakehouse transformation, warehouse serving, and Power BI consumption.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e252d" />
      <stop offset="100%" stop-color="#2c3945" />
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#18bfef" stop-opacity="1" />
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.35" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <path id="flowPath" d="M120 300 H1080" />
  </defs>
  <rect width="1200" height="520" fill="url(#bg)" rx="24" />
  <circle cx="210" cy="120" r="140" fill="#18bfef" opacity="0.08" />
  <circle cx="980" cy="420" r="170" fill="#18bfef" opacity="0.06" />
  <text x="600" y="82" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" letter-spacing="6" text-anchor="middle">MICROSOFT FABRIC PIPELINE</text>
  <text x="600" y="122" fill="#d6e3ee" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">GitHub API to Lakehouse to Warehouse to Power BI</text>
  <path d="M120 300 H1080" fill="none" stroke="#8ecae6" stroke-opacity="0.18" stroke-width="22" stroke-linecap="round" />
  <path d="M120 300 H1080" fill="none" stroke="url(#flow)" stroke-width="10" stroke-linecap="round" filter="url(#glow)" />
  <g>
    <rect x="70" y="240" width="160" height="94" rx="22" fill="#ffffff" />
    <text x="150" y="278" fill="#1e252d" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" text-anchor="middle">SOURCE</text>
    <text x="150" y="309" fill="#51606d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" text-anchor="middle">CSV API</text>
  </g>
  <g>
    <rect x="285" y="240" width="160" height="94" rx="22" fill="#ffffff" />
    <text x="365" y="278" fill="#1e252d" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" text-anchor="middle">INGEST</text>
    <text x="365" y="309" fill="#51606d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Pipeline</text>
  </g>
  <g>
    <rect x="500" y="240" width="200" height="94" rx="22" fill="#ffffff" />
    <text x="600" y="278" fill="#1e252d" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" text-anchor="middle">TRANSFORM</text>
    <text x="600" y="309" fill="#51606d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" text-anchor="middle">PySpark + Dataflow</text>
  </g>
  <g>
    <rect x="755" y="240" width="160" height="94" rx="22" fill="#ffffff" />
    <text x="835" y="278" fill="#1e252d" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" text-anchor="middle">SERVE</text>
    <text x="835" y="309" fill="#51606d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Warehouse</text>
  </g>
  <g>
    <rect x="970" y="240" width="160" height="94" rx="22" fill="#ffffff" />
    <text x="1050" y="278" fill="#1e252d" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" text-anchor="middle">CONSUME</text>
    <text x="1050" y="309" fill="#51606d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Power BI</text>
  </g>
  <circle r="10" fill="#18bfef" filter="url(#glow)">
    <animateMotion dur="4.5s" repeatCount="indefinite">
      <mpath href="#flowPath" />
    </animateMotion>
  </circle>
  <circle r="10" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="4.5s" begin="2.2s" repeatCount="indefinite">
      <mpath href="#flowPath" />
    </animateMotion>
  </circle>
</svg>
